<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- DaisyUi and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
  </head>
  <body class="bg-gray-50">
    <header>
      <nav>
        <div class="flex justify-evenly px-20 py-5 bg-base-100 shadow-sm">
          <div class="flex-1">
            <a class="btn btn-ghost text-xl">
              <img class="w-8" src="./assets/github-logo.png" alt="" />
              <h2 class="text-2xl max-sm:hidden">GitHub Issues Tracker</h2>
            </a>
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto" />
            <div class="">
              <div>
                <div class="btn btn-primary">
                  <i class="fa-solid fa-plus"></i>New Issue
                </div>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!-- All Buttons -->
      <section
        id="btnContainer"
        class="container flex gap-3 mx-auto mt-10 bg-white p-5 rounded-lg">
        <div id="allBtn" class="btn btn-primary px-10">All</div>
        <div id="openBtn" class="btn btn-default px-10">Open</div>
        <div id="closedBtn" class="btn btn-default px-10">Closed</div>
      </section>
      <!-- Section Status -->
      <section
        class="container flex gap-3 mx-auto mt-3 bg-white p-5 rounded-t-lg justify-between">
        <div class="flex justify-center items-center gap-3">
          <img
            class="w-10 bg-gray-300 p-1 rounded-full"
            src="./assets/Aperture.png"
            alt="Aperture.png" />
          <div>
            <h3 class="text-2xl font-medium">
              <span id="allStatus">0</span> Issues
            </h3>
            <p class="text-gray-400">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-5">
          <div id="openStatus" class="flex items-center gap-2">
            <i class="fa-solid fa-circle text-green-600"></i>
            <p>Open</p>
          </div>
          <div id="closedStatus" class="flex items-center gap-2">
            <i class="fa-solid fa-circle text-purple-600"></i>
            <p>Closed</p>
          </div>
        </div>
      </section>
      <hr class="container mx-auto text-gray-300" />
      <!-- All Issues -->
      <section
        id="issueContainer"
        class="container mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 bg-gray-100 p-10">
        <!-- <div class="card bg-base-100 shadow-lg">

          <div class="card-body">
            <header class="flex justify-between">
              <img src="./assets/Open-Status.png" alt="" />
              <div class="badge badge-soft badge-warning">Warning</div>
            </header>
            <h2 class="card-title">Card Title</h2>
            <p>
              A card component has a figure, a body part, and inside body there
              are title and actions parts
            </p>
            <div class="flex gap-5">
              <div class="badge badge-secondary badge-outline">Bug</div>
              <div class="badge badge-warning badge-outline">help wanted</div>
            </div>
            <hr class="text-gray-300" />
            <div class="author-text">
              <p>#1 by john_doe</p>
              <p>1/15/2024</p>
            </div>
          </div>
        </div> -->
      </section>
      <!-- loading Spinner -->
      <div id="loadingSpinner" class="hidden w-10 justify-center mx-auto m-20">
        <span class="loading loading-bars loading-xl"></span>
      </div>
      <!-- Modal -->
      <section class="container mx-auto">
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn" onclick="my_modal_1.showModal()">open modal</button>
        <dialog id="my_modal_1" class="modal">
          <div class="modal-box">
            <h3 class="text-lg font-bold">Hello!</h3>
            <p class="py-4">Press ESC key or click the button below to close</p>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>

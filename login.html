<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- DaisyUi and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
  </head>
  <body>
    <section
      class="w-[550px] mx-auto text-center shadow-lg p-5 mt-30 rounded-lg">
      <div class="login-text-content">
        <img class="mx-auto" src="./assets/github-logo.png" alt="github logo" />
        <h2 class="text-4xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-xl font-normal text-gray-500">
          Sign in to manage your issues
        </p>
      </div>
      <fieldset class="fieldset rounded-box w-lg p-4 mx-auto">
        <label class="label font-semibold text-lg text-black">Username</label>
        <input type="email" class="input w-full" placeholder="Enter Username" />
        <p class="text-purple-600 text-left">Default: admin</p>

        <label class="label font-semibold text-lg text-black">Password</label>
        <input
          type="password"
          class="input w-full"
          placeholder="Enter Password" />
        <p class="text-purple-600 text-left">Default: admin123</p>

        <button class="btn btn-primary mt-4">Sign In</button>
      </fieldset>
      <div class="credentials">
        <div class="flex justify-evenly items-center text-gray-300 py-5">
          <hr class="w-[200px]" />
          <p class="text-gray-700">OR</p>
          <hr class="w-[200px]" />
        </div>

        <p class="text-gray-500">Demo Credentials:</p>
        <div class="bg-gray-50 p-3 rounded-lg mt-3">
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </div>
    </section>
  </body>
</html>
